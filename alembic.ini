# Alembic configuration for Timelapse Manager.
#
# The database URL is resolved in alembic/env.py from the application's engine
# helper rather than hard-coded here, so migrations share the same connection
# setup (including WAL) as the running application. The value below is only a
# fallback default.

[alembic]
script_location = alembic
prepend_sys_path = src
# Use OS-native path separators for version file paths and sys-path entries.
path_separator = os
version_path_separator = os
sqlalchemy.url = sqlite:///./timelapse.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
