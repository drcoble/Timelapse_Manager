# Pre-commit hooks: lint, format, and type-check before each commit.
# Mirrors the gates enforced in CI so failures surface locally first.

default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        # Type-check only the application package. The Alembic environment and
        # migration scripts use dynamically-populated context objects that are
        # awkward under a strict configuration and are not part of the shipped
        # package surface.
        files: ^src/
        additional_dependencies:
          - fastapi
          - pydantic
          - pydantic-settings
          - sqlalchemy
          - types-PyYAML
