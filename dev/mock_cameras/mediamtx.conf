# mediamtx configuration for the local mock RTSP camera.
#
# Runs a minimal RTSP server on port 8554. An external FFmpeg process
# (see ffmpeg_testsrc.py) publishes a synthetic "testsrc" stream to the
# path /testsrc, which camera adapters can pull from:
#
#     rtsp://localhost:8554/testsrc
#
# Only RTSP is enabled; the HLS/WebRTC/RTMP/SRT servers and the API/metrics
# endpoints are turned off to keep the dev footprint small.

###############################################
# Logging

logLevel: info
logDestinations: [stdout]

###############################################
# Protocols: RTSP only

rtsp: yes
rtspAddress: :8554
# TCP is the most reliable transport for local development and through
# containers; UDP is left enabled as a fallback for adapter testing.
rtspTransports: [tcp, udp]

rtmp: no
hls: no
webrtc: no
srt: no

###############################################
# Control surfaces (disabled for a lean dev server)

api: no
metrics: no
pprof: no
playback: no

###############################################
# Paths
#
# The /testsrc path is published to by the local FFmpeg process. Allowing
# publishers and readers without credentials is acceptable here because the
# server binds only for local development against synthetic content.

paths:
  testsrc:
    source: publisher
